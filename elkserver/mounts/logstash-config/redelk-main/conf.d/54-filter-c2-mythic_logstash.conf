# Part of RedELK
#
# In this file we configure the logstash filters for Mythic logs
#
# Author: Outflank B.V. / Marc Smeets
#

filter {
  if [infra][log][type] == "rtops" and [c2][program] == "mythic" {

    # ECS host.name is usually filled with the C2 server hostname by Beats.
    # For Mythic events we want host.* to describe the target, not the C2 server.
    if [agent][name] == [host][name] {
      mutate {
        remove_field => [ "[host][name]" ]
      }
    }

    if [json] {
      mutate {
        rename => { "[json]" => "[mythic]" }
      }
    }

    if [mythic][timestamp] {
      date {
        match => [ "[mythic][timestamp]", "ISO8601" ]
        target => "@timestamp"
        timezone => "Etc/UTC"
      }
      mutate {
        copy => { "[mythic][timestamp]" => "[c2][timestamp]" }
      }
    } else if [mythic][utctimestamp] {
      date {
        match => [ "[mythic][utctimestamp]", "ISO8601" ]
        target => "@timestamp"
        timezone => "Etc/UTC"
      }
      mutate {
        copy => { "[mythic][utctimestamp]" => "[c2][timestamp]" }
      }
    } else if [mythic][time] {
      date {
        match => [ "[mythic][time]", "ISO8601", "UNIX", "UNIX_MS" ]
        target => "@timestamp"
        timezone => "Etc/UTC"
      }
      mutate {
        copy => { "[mythic][time]" => "[c2][timestamp]" }
      }
    } else {
      mutate {
        copy => { "@timestamp" => "[c2][timestamp]" }
      }
    }

    if [mythic][message] {
      mutate {
        copy => { "[mythic][message]" => "[c2][message]" }
      }
    } else if [mythic][display] {
      mutate {
        copy => { "[mythic][display]" => "[c2][message]" }
      }
    } else if [mythic][description] {
      mutate {
        copy => { "[mythic][description]" => "[c2][message]" }
      }
    } else if [mythic][status] {
      mutate {
        copy => { "[mythic][status]" => "[c2][message]" }
      }
    } else {
      mutate {
        add_field => { "[c2][message]" => "%{message}" }
      }
    }

    if [mythic][mythic_object] {
      mutate {
        copy => { "[mythic][mythic_object]" => "[c2][mythic][object]" }
      }
    }

    if [mythic][operation_name] {
      mutate {
        copy => { "[mythic][operation_name]" => "[infra][attack_scenario]" }
      }
    }

    if [mythic][callback_id] {
      mutate {
        copy => { "[mythic][callback_id]" => "[implant][id]" }
      }
    }

    if [mythic][callback_display_id] {
      mutate {
        copy => { "[mythic][callback_display_id]" => "[implant][display_id]" }
      }
    }

    if [mythic][task_id] {
      mutate {
        copy => { "[mythic][task_id]" => "[implant][task_id]" }
      }
    }

    if [mythic][task_display_id] {
      mutate {
        copy => { "[mythic][task_display_id]" => "[implant][task_display_id]" }
      }
    }

    if [mythic][operator_username] {
      mutate {
        copy => { "[mythic][operator_username]" => "[c2][operator]" }
      }
    } else if [mythic][operator] {
      mutate {
        copy => { "[mythic][operator]" => "[c2][operator]" }
      }
    }

    if [mythic][command_name] {
      mutate {
        copy => { "[mythic][command_name]" => "[implant][task]" }
      }
    }

    if [mythic][params] {
      mutate {
        copy => { "[mythic][params]" => "[implant][task_parameters]" }
      }
    }

    if [mythic][response] {
      mutate {
        copy => { "[mythic][response]" => "[implant][output]" }
      }
    }

    if [mythic][host] {
      mutate {
        copy => { "[mythic][host]" => "[host][name]" }
      }
    } else if [mythic][hostname] {
      mutate {
        copy => { "[mythic][hostname]" => "[host][name]" }
      }
    }

    if [mythic][domain] {
      mutate {
        copy => { "[mythic][domain]" => "[host][domain]" }
      }
    }

    if [mythic][user] {
      mutate {
        copy => { "[mythic][user]" => "[user][name]" }
      }
    } else if [mythic][username] {
      mutate {
        copy => { "[mythic][username]" => "[user][name]" }
      }
    }

    # Fallback: parse owner field "HOSTNAME\username" when host/user not otherwise populated
    if [mythic][owner] {
      if ![host][name] or ![user][name] {
        grok {
          match => { "[mythic][owner]" => "(?<[mythic][_owner_host]>[^\\\\]+)\\\\(?<[mythic][_owner_user]>.+)" }
          tag_on_failure => []
        }
        if ![host][name] and [mythic][_owner_host] {
          mutate {
            copy => { "[mythic][_owner_host]" => "[host][name]" }
          }
        }
        if ![user][name] and [mythic][_owner_user] {
          mutate {
            copy => { "[mythic][_owner_user]" => "[user][name]" }
          }
        }
        mutate {
          remove_field => [ "[mythic][_owner_host]", "[mythic][_owner_user]" ]
        }
      }
    }

    if [mythic][pid] {
      mutate {
        copy => { "[mythic][pid]" => "[process][pid]" }
      }
    } else if [mythic][process_id] {
      mutate {
        copy => { "[mythic][process_id]" => "[process][pid]" }
      }
    }

    if [mythic][process_name] {
      mutate {
        copy => { "[mythic][process_name]" => "[process][name]" }
      }
    }

    if [mythic][architecture] {
      mutate {
        copy => { "[mythic][architecture]" => "[implant][arch]" }
      }
    }

    if [mythic][ip] {
      mutate {
        add_field => { "[host][ip]" => "%{[mythic][ip]}" }
        copy => { "[mythic][ip]" => "[host][ip_int]" }
      }
    }

    if [mythic][external_ip] {
      mutate {
        add_field => { "[host][ip]" => "%{[mythic][external_ip]}" }
        copy => { "[mythic][external_ip]" => "[host][ip_ext]" }
      }
    } else if [mythic][ip] {
      mutate {
        copy => { "[mythic][ip]" => "[host][ip_ext]" }
      }
    }

    if [mythic][payload_type] {
      mutate {
        copy => { "[mythic][payload_type]" => "[c2][listener][profile]" }
      }
    }

    if [mythic][c2_profile] {
      mutate {
        copy => { "[mythic][c2_profile]" => "[c2][listener][type]" }
      }
    }

    if [host][ip_ext] {
      mutate {
        add_field => { "[host][domain_ext]" => "%{[host][ip_ext]}" }
      }
      dns {
        reverse => ["[host][domain_ext]"]
        action => "replace"
        timeout => "2.0"
      }
      geoip {
        source => "[host][ip_ext]"
        target => "[host]"
        add_tag => "geoip_host_city"
      }
      geoip {
        source => "[host][ip_ext]"
        target => "[host]"
        default_database_type => "ASN"
        add_tag => "geoip_host_asn"
      }
    }

    mutate {
      replace => { "[c2][log][type]" => "events" }
    }

    if [mythic][mythic_object] == "callback" {
      mutate {
        replace => { "[c2][log][type]" => "implant_newimplant" }
      }
    } else if [mythic][mythic_object] == "task" {
      mutate {
        replace => { "[c2][log][type]" => "implant_task" }
      }
    } else if [mythic][mythic_object] == "response" {
      mutate {
        replace => { "[c2][log][type]" => "implant_output" }
      }
    } else if [mythic][mythic_object] == "credential" {
      mutate {
        replace => { "[c2][log][type]" => "credentials" }
      }
    } else if [mythic][mythic_object] == "artifact" {
      mutate {
        replace => { "[c2][log][type]" => "ioc" }
      }
    } else if [mythic][mythic_object] == "filemeta" or [mythic][mythic_object] == "download" {
      mutate {
        replace => { "[c2][log][type]" => "downloads" }
      }
    }

    if [c2][log][type] == "credentials" {
      if [mythic][account] {
        mutate {
          copy => { "[mythic][account]" => "[creds][username]" }
        }
      }
      if [mythic][realm] {
        mutate {
          copy => { "[mythic][realm]" => "[creds][realm]" }
        }
      }
      if [mythic][credential] {
        mutate {
          copy => { "[mythic][credential]" => "[creds][credential]" }
        }
      }
      if [mythic][credential_type] {
        mutate {
          copy => { "[mythic][credential_type]" => "[creds][type]" }
        }
      }
    }

    if [c2][log][type] == "ioc" {
      if [mythic][artifact] {
        mutate {
          copy => { "[mythic][artifact]" => "[ioc][value]" }
        }
      }
      if [mythic][artifact_type] {
        mutate {
          copy => { "[mythic][artifact_type]" => "[ioc][type]" }
        }
      }
    }

    if [c2][log][type] == "downloads" {
      if [mythic][filename] {
        mutate {
          copy => { "[mythic][filename]" => "[file][name]" }
        }
      }
      if [mythic][full_remote_path] {
        mutate {
          copy => { "[mythic][full_remote_path]" => "[file][path]" }
        }
      }
      if [mythic][agent_file_id] {
        mutate {
          copy => { "[mythic][agent_file_id]" => "[file][id]" }
        }
      }
    }

    if [c2][log][type] == "implant_newimplant" {
      clone {
        clones => [ "implantsdb" ]
        remove_field => [ "[c2][log][type]", "message", "[infra][log][type]" ]
      }
    }
  }
}
